spring.application.name=forohub-g9-rest
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/forohub
spring.datasource.username=root
spring.datasource.password=as123456

# si no se usa Flyway, se puede usar esta propiedad para que hibernate
# cree o actualice las tablas automaticamente
# spring.jpa.hibernate.ddl-auto=update
#spring.flyway.baseline-on-migrate=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.devtools.add-properties=false
server.error.include-stacktrace=never

# se inyecta a la clase TokenService.
# Si no existe variable de entorno del sistema JWT_SECRET usar 12345678 de desarrollo
jwt.secret=${JWT_SECRET:12345678}
jwt.expiration=2

# Indicar a Spring que busque en los WebJars (donde vive Swagger)
# Permitir que Spring encuentre los recursos de Swagger en su ruta por defecto
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/static/

# Configuraciˇn especÝfica de SpringDoc para evitar el error de "No static resource"
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.api-docs.path=/v3/api-docs

# Desactiva explÝcitamente el soporte de Hateoas en SpringDoc para evitar el error de inyecciˇn
springdoc.show-actuator=false
springdoc.enable-hateoas=false